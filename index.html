<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LARJ UI Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="screen">
        <div class="screen__main">
          <header class="hero">
            <h1 id="room-name" class="hero__title">Great Hall</h1>
            <div class="hero__divider" aria-hidden="true"></div>
            <p id="room-description" class="hero__description"></p>
          </header>

          <section class="action-panel" aria-label="Current action panel">
            <div class="action-panel__message">
              <p id="message-text"></p>
            </div>
            <div id="action-bar" class="action-panel__bar" aria-live="polite"></div>
          </section>
        </div>

        <aside class="sidebar" aria-label="Inventory and exits">
          <section class="sidebar__section">
            <button
              id="toggle-items"
              class="sidebar__title sidebar__toggle"
              type="button"
              aria-expanded="false"
              aria-controls="inventory-panel"
            >
              <span>Items</span>
              <span id="items-toggle-icon" class="sidebar__toggle-icon" aria-hidden="true">+</span>
            </button>
            <div id="inventory-panel" class="sidebar__panel sidebar__panel--collapsed">
              <div id="inventory-list" class="sidebar__list"></div>
            </div>
          </section>

          <section class="sidebar__section sidebar__section--spaced">
            <button id="open-exits" class="sidebar__title sidebar__link" type="button">
              Exits
            </button>
          </section>

          <button
            id="open-hints"
            class="hint-button"
            type="button"
            aria-label="Open hints"
            title="Open hints"
          >
            <i class="fa-regular fa-lightbulb" aria-hidden="true"></i>
          </button>
        </aside>
      </section>

      <div id="modal-overlay" class="modal-overlay hidden" aria-hidden="true">
        <section
          id="hint-modal"
          class="modal hidden"
          role="dialog"
          aria-modal="true"
          aria-labelledby="hint-title"
        >
          <div class="modal__header">
            <h2 id="hint-title" class="modal__title">Hint</h2>
          </div>
          <section id="hint-card" class="hint-card hint-card--locked" aria-live="polite">
            <div id="hint-text" class="hint-card__copy"></div>
            <button id="hint-reveal" class="hint-card__action" type="button" aria-label="Use one hint credit">
              <svg class="hint-card__icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M4 7a2 2 0 0 0 2-2h12a2 2 0 0 0 2 2v3a2 2 0 0 0 0 4v3a2 2 0 0 0-2 2H6a2 2 0 0 0-2-2v-3a2 2 0 0 0 0-4V7z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linejoin="round"
                />
                <path d="M9 8v1M9 15v1M15 8v1M15 15v1" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
              </svg>
              <span id="hint-index" class="hint-card__cost">1/3</span>
            </button>
          </section>
          <div class="modal__actions">
            <button id="hint-prev" class="button button--dark" type="button">Prev Hint</button>
            <button id="hint-next" class="button button--dark" type="button">Next Hint</button>
            <button data-close-modal="hint" class="button button--dark" type="button">Close</button>
          </div>
        </section>

        <section
          id="exits-modal"
          class="modal modal--wide hidden"
          role="dialog"
          aria-modal="true"
          aria-labelledby="exits-title"
        >
          <h2 id="exits-title" class="modal__title">Exits</h2>
          <div id="exits-map" class="exits-map"></div>
          <div class="modal__actions modal__actions--single">
            <button data-close-modal="exits" class="button button--dark" type="button">Close</button>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
